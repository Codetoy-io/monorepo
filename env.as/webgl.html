<!DOCTYPE html>
<html>
<head>
    <title>WebGL drawArrays Example</title>
    <style>
        canvas { border: 1px solid black; }
    </style>
</head>
<body>
    <canvas id="glcanvas" width="640" height="480"></canvas>
    <script>
        main();

        function main() {
            const canvas = document.querySelector("#glcanvas");
            const gl = canvas.getContext("webgl");

            if (!gl) {
                alert("Unable to initialize WebGL. Your browser or machine may not support it.");
                return;
            }

            // Vertex shader program
            const vsSource = `
                attribute vec4 a_position;
                void main() {
                    gl_Position = a_position;
                }
            `;

            // Fragment shader program
            const fsSource = `
                precision mediump float;
                void main() {
                    gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0); // Solid red color
                }
            `;

            // Initialize a shader program
            const shaderProgram = initShaderProgram(gl, vsSource, fsSource);

            // Set up buffers and vertex attributes
            const buffers = initBuffers(gl);
            
            // Draw the scene
            drawScene(gl, shaderProgram, buffers);
        }

        //
        // creates a shader of the given type, uploads the source and compiles it.
        //
        function loadShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);

            // Check if it compiled successfully
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('An error occurred compiling the shaders: ' + gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }

            return shader;
        }

        //
        // Initialize a shader program, so WebGL knows how to draw our data
        //
        function initShaderProgram(gl, vsSource, fsSource) {
            const vertexShader = loadShader(gl, gl.VERTEX_SHADER, vsSource);
            const fragmentShader = loadShader(gl, gl.FRAGMENT_SHADER, fsSource);

            // Create the shader program
            const shaderProgram = gl.createProgram();
            gl.attachShader(shaderProgram, vertexShader);
            gl.attachShader(shaderProgram, fragmentShader);
            gl.linkProgram(shaderProgram);

            // Check if it linked successfully
            if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
                console.error('Unable to initialize the shader program: ' + gl.getProgramInfoLog(shaderProgram));
                return null;
            }

            return shaderProgram;
        }

        //
        // Initialize buffers with vertex data
        //
        function initBuffers(gl) {
            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);

            // Define a rectangle as two triangles (6 vertices total) in clip space coordinates
            const positions = [
                -0.5, -0.5,  // Bottom-left
                 0.5, -0.5,  // Bottom-right
                -0.5,  0.5,  // Top-left
                -0.5,  0.5,  // Top-left (second triangle start)
                 0.5, -0.5,  // Bottom-right (second triangle second vertex)
                 0.5,  0.5,  // Top-right (second triangle third vertex)
            ];

            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

            return {
                position: positionBuffer,
            };
        }

        //
        // Draw the scene
        //
        function drawScene(gl, shaderProgram, buffers) {
            gl.clearColor(0.0, 0.0, 0.0, 1.0);  // Clear to black, fully opaque
            gl.clearDepth(1.0);                 // Clear everything
            gl.enable(gl.DEPTH_TEST);           // Enable depth testing
            gl.depthFunc(gl.LEQUAL);            // Near things obscure far things

            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            // Tell WebGL to use our program when drawing
            gl.useProgram(shaderProgram);

            // Bind the position buffer and enable the attribute
            gl.bindBuffer(gl.ARRAY_BUFFER, buffers.position);
            const numComponents = 2; // pull out 2 components per iteration (x, y)
            const type = gl.FLOAT;   // the data in the buffer is 32bit floats
            const normalize = false; // don't normalize
            const stride = 0;        // 0 = move forward size * sizeof(type) each iteration
            const offset = 0;        // start at the beginning of the buffer
            const positionAttributeLocation = gl.getAttribLocation(shaderProgram, 'a_position');
            gl.vertexAttribPointer(
                positionAttributeLocation,
                numComponents,
                type,
                normalize,
                stride,
                offset);
            gl.enableVertexAttribArray(positionAttributeLocation);

            // Draw the geometry
            gl.drawArrays(gl.TRIANGLES, 0, 6); // Draw 6 vertices starting from index 0
        }
    </script>
</body>
</html>
